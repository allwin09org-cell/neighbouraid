<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neighbor Aid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <div id="auth-section" class="auth-container">
  <div class="auth-card">
    <h1>Neighbor Aid</h1>
    <p class="subtitle">Helping communities connect 🤝</p>

    <input type="email" id="email" placeholder="Enter your email">
    <input type="password" id="password" placeholder="Enter your password">

    <button class="primary" onclick="signup()">Create Account</button>
    <button class="secondary" onclick="login()">Login</button>

    <p id="authMessage"></p>
  </div>
</div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">

      <header>
        <h2>Neighbor Aid Dashboard</h2>
        <p id="userEmail"></p>
        <button onclick="logout()">Logout</button>
      </header>

      <div class="container">

        <!-- Help Requests -->
        <div class="card">
          <h3>Request Help</h3>
          <textarea id="requestInput" placeholder="Describe your need..."></textarea>
          <button onclick="postRequest()">Post</button>
        </div>

        <div class="card">
          <h3>Community Requests</h3>
          <div id="requestsList"></div>
        </div>

        <!-- Chat -->
        <div class="card">
          <h3>Community Chat</h3>
          <div id="chatBox"></div>
          <input id="chatInput" placeholder="Type a message...">
          <button onclick="sendMessage()">Send</button>
        </div>

      </div>

    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
